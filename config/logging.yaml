# Valtronics Logging Configuration
version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s [%(filename)s:%(lineno)d]: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  json:
    format: '{"timestamp": "%(asctime)s", "level": "%(levelname)s", "logger": "%(name)s", "file": "%(filename)s", "line": %(lineno)d, "message": "%(message)s"}'
    datefmt: "%Y-%m-%dT%H:%M:%S"

  access:
    format: "%(asctime)s [%(levelname)s] %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: /app/logs/valtronics.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: /app/logs/errors.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

  access_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: access
    filename: /app/logs/access.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

  json_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: /app/logs/valtronics.json
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

  syslog:
    class: logging.handlers.SysLogHandler
    level: INFO
    formatter: standard
    address: /dev/log
    facility: local0

loggers:
  # Application loggers
  app:
    level: DEBUG
    handlers: [console, file, json_file]
    propagate: false

  app.main:
    level: INFO
    handlers: [console, file]
    propagate: false

  app.api:
    level: INFO
    handlers: [console, file, json_file]
    propagate: false

  app.services:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  app.models:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  # External library loggers
  sqlalchemy:
    level: WARNING
    handlers: [file]
    propagate: false

  sqlalchemy.engine:
    level: WARNING
    handlers: [file]
    propagate: false

  uvicorn:
    level: INFO
    handlers: [console, file, access_file]
    propagate: false

  uvicorn.access:
    level: INFO
    handlers: [access_file]
    propagate: false

  uvicorn.error:
    level: ERROR
    handlers: [error_file]
    propagate: false

  fastapi:
    level: INFO
    handlers: [console, file]
    propagate: false

  paho:
    level: WARNING
    handlers: [file]
    propagate: false

  redis:
    level: WARNING
    handlers: [file]
    propagate: false

  # Root logger
  "":
    level: INFO
    handlers: [console, file, error_file]
    propagate: true

# Environment-specific configurations
development:
  formatters:
    standard:
      format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s (%(filename)s:%(lineno)d)"
  
  handlers:
    console:
      level: DEBUG
  
  loggers:
    "":
      level: DEBUG

production:
  handlers:
    console:
      level: WARNING
      formatter: json
  
  loggers:
    "":
      level: INFO
      handlers: [file, json_file, syslog]

testing:
  handlers:
    console:
      level: DEBUG
  
  loggers:
    "":
      level: DEBUG
