name: Complete Deployment Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Site deployment job
  deploy-site:
    name: Deploy Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  # Health check job
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy-site
    steps:
      - name: Wait for deployment
        run: sleep 60
      
      - name: Check website
        run: |
          curl -f https://autobotsolutions.github.io/Valtronics/ || echo "Website not yet available"

  # Notification job
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-site, health-check]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 Valtronics Website Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://autobotsolutions.github.io/Valtronics/" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date)" >> $GITHUB_STEP_SUMMARY
