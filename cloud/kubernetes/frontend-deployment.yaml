apiVersion: apps/v1
kind: Deployment
metadata:
  name: valtronics-frontend
  labels:
    app: valtronics-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: valtronics-frontend
  template:
    metadata:
      labels:
        app: valtronics-frontend
        component: frontend
    spec:
      containers:
      - name: frontend
        image: valtronics/frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: valtronics-frontend
  labels:
    app: valtronics-frontend
    component: frontend
spec:
  selector:
    app: valtronics-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: valtronics-ingress
  labels:
    app: valtronics
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
  - hosts:
    - valtronics.example.com
    secretName: valtronics-tls
  rules:
  - host: valtronics.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: valtronics-backend
            port:
              number: 8000
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: valtronics-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: valtronics-frontend
            port:
              number: 80
